
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS ART | Luxury Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            text-align: center;
        }
        header { padding: 80px 20px 40px 20px; }
        h1 { font-weight: 200; font-size: 2.5rem; letter-spacing: 8px; text-transform: uppercase; margin: 0; }
        p { font-weight: 300; letter-spacing: 2px; color: #666; margin-top: 10px; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            transition: opacity 0.8s ease;
        }
        .gallery img:hover { opacity: 0.8; }

        .contact-section { padding: 80px 20px; }
        .contact-btn {
            padding: 15px 40px;
            border: 1px solid #1a1a1a;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .contact-btn:hover { background-color: #1a1a1a; color: #ffffff; }
    </style>
</head>
<body>

    <header>
        <h1>SAS ART</h1>
        <p>Hyperrealistic Portraiture</p>
    </header>

    <div class="gallery">
        <img src="02594470fd558d91687948bb247236a3.jpg" alt="Hyperrealistic Portrait">
        <img src="9aba5442c8ffb304c442475681121087.jpg" alt="Hyperrealistic Portrait">
        <img src="f0c31f76c2e73161c9e7821617415494.jpg" alt="Hyperrealistic Portrait">
    </div>

    <div class="contact-section">
        <a href="mailto:your-email@example.com" class="contact-btn">Inquire for Commission</a>
    </div>

</body>
</html>
