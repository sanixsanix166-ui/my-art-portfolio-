<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS ART | Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
            text-align: center;
        }
        header { padding: 50px 20px; }
        h1 { font-weight: 300; letter-spacing: 2px; }
        
        /* Grid Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .gallery img:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <header>
        <h1>SAS ART</h1>
        <p>Hyperrealistic Portraiture</p>
    </header>

    <div class="gallery">
        <!-- Replace the src below with your actual image file names -->
        <img src="your-art-1.jpg" alt="Hyperrealistic Portrait">
        <img src="your-art-2.jpg" alt="Hyperrealistic Portrait">
    </div>

</body>
</html>
